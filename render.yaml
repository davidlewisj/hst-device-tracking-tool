services:
  - type: web
    name: hst-device-tracking-tool
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow from all IPs
    envVars:
      - key: NODE_ENV
        value: production